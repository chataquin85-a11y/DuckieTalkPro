<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duckie Talk Pro</title>
    <style>
        :root { --primary: #6a1b9a; --bg: #121212; }
        body { margin: 0; font-family: sans-serif; display: flex; height: 100vh; background: var(--bg); color: #eee; }
        #sidebar { width: 250px; background: #1e1e1e; padding: 20px; border-right: 1px solid #333; }
        #main { flex: 1; padding: 20px; display: flex; flex-direction: column; }
        #chat-box { flex: 1; background: #1a1a1a; border-radius: 8px; border: 1px solid #333; padding: 20px; overflow-y: auto; margin-bottom: 10px; }
        input, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 4px; border: 1px solid #444; }
        input { background: #222; color: white; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h3>Duckie Talk Pro</h3>
        <p style="color: #aaa; font-size: 14px;">Estado: Listo y Guardado</p>
    </div>
    <div id="main">
        <div id="chat-box"></div>
        <input type="password" id="key" placeholder="Pega tu llave Groq (gsk_...) - Se guardará sola">
        <input type="text" id="msg" placeholder="Escribe tu mensaje...">
        <button onclick="enviar()">Enviar mensaje</button>
    </div>
    <script>
        // Cargar la llave guardada automáticamente al abrir la página
        window.onload = function() {
            const savedKey = localStorage.getItem('groq_key');
            if (savedKey) {
                document.getElementById('key').value = savedKey;
            }
        };

        async function enviar() {
            const keyInput = document.getElementById('key');
            const key = keyInput.value.trim();
            const msg = document.getElementById('msg').value;
            const box = document.getElementById('chat-box');

            if(!key) { 
                alert("¡Pega tu llave de Groq primero!"); 
                return; 
            }

            // Guardar la llave en el navegador para futuras visitas
            localStorage.setItem('groq_key', key);

            if(!msg) return;

            box.innerHTML += `<div><b>Tú:</b> ${msg}</div>`;
            document.getElementById('msg').value = '';

            try {
                const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{ role: "user", content: msg }]
                    })
                });
                const data = await res.json();
                if(data.choices) {
                    box.innerHTML += `<div><b>Duckie:</b> ${data.choices[0].message.content}</div>`;
                } else {
                    box.innerHTML += `<div style="color:red">Error en la respuesta.</div>`;
                }
            } catch(e) { 
                box.innerHTML += `<div style="color:red">Error de conexión.</div>`; 
            }
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
