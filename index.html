<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duckie Talk Pro</title>
    <style>
        /* -- Styles from your specs (image_10.png, Page 1 & 2) -- */
        :root {
            --bg-color: #f0f8ff; /* User changeable */
            --chat-bubble-user: #e1ffc7;
            --chat-bubble-ai: #f0f0f0;
            --header-color: #333;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
        }
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 10px;
            word-wrap: break-word;
        }
        .user-message {
            align-self: flex-end;
            background-color: var(--chat-bubble-user);
        }
        .ai-message {
            align-self: flex-start;
            background-color: var(--chat-bubble-ai);
        }
        /* -- Input Area (image_10.png, Page 1) -- */
        #input-area {
            background: #fff;
            border-top: 1px solid #ddd;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        textarea {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            resize: none;
            height: 40px;
        }
        button {
            padding: 10px 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover { background-color: #0056b3; }
        /* -- Additional Buttons (image_10.png, Page 1) -- */
        .icon-btn { background: none; color: #555; font-size: 1.2em; padding: 5px; }
        .icon-btn:hover { color: #007bff; }
    </style>
</head>
<body>

    <header style="background: var(--header-color); color: white; padding: 15px; text-align: center;">
        Duckie Talk Pro
    </header>

    <div id="chat-container">
        <div class="message ai-message">Hello! I am Duckie. How can I help you today?</div>
    </div>

    <div id="input-area">
        <button class="icon-btn" title="Emoji">😃</button>
        <button class="icon-btn" title="GIF">GIF</button>
        <button class="icon-btn" title="Stickers">Stc</button>
        <textarea id="user-input" placeholder="talk to Duckie..."></textarea>
        <button class="icon-btn" title="Microphone">🎙️</button>
        <button id="send-btn">Send</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        function appendMessage(sender, text) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message');
            messageDiv.classList.add(sender === 'user' ? 'user-message' : 'ai-message');
            messageDiv.textContent = text;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        sendBtn.addEventListener('click', async () => {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage('user', text);
            userInput.value = '';

            try {
                // SECURE CALL: This talks ONLY to your Netlify Function.
                const response = await fetch('/.netlify/functions/chat-handler', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ prompt: text }),
                });

                const data = await response.json();

                if (response.ok) {
                    appendMessage('ai', data.reply);
                } else {
                    appendMessage('ai', "Oops! I'm having trouble connecting. " + (data.error || ""));
                }

            } catch (error) {
                console.error('Error:', error);
                appendMessage('ai', "Error connecting to Duckie's servers.");
            }
        });

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendBtn.click();
            }
        });
    </script>
</body>
</html>
