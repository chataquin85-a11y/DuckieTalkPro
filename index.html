<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duckie Talk ^+^_^/</title>
    <style>
        /* --- Global Styles --- */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Prevent scrolling on body */
        }

        #app-container {
            width: 100%;
            height: 100vh;
            position: relative;
        }

        /* --- SCREEN 1: THE APP FACE --- */
        #app-face {
            display: flex; /* Shown by default */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #87CEEB; /* Light Sky Blue from your plan */
            text-align: center;
            width: 100%;
            height: 100%;
            cursor: pointer; /* Entire screen is a button */
        }

        #app-face:hover {
            background-color: #7AB8D4; /* Slightly darker on hover */
        }

        #logo-image {
            width: 200px; /* Adjust size as needed */
            height: 200px;
            border-radius: 50%; /* Makes it circular */
            object-fit: cover;
            margin-bottom: 20px;
            border: 5px solid white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        #app-title {
            font-size: 3rem;
            color: #333;
            margin: 10px 0;
            font-weight: bold;
        }

        #app-subtitle {
            font-size: 1.5rem;
            color: #555;
            margin-top: 5px;
        }

        /* --- SCREEN 2: THE CHAT INTERFACE --- */
        #chat-interface {
            display: none; /* Hidden by default */
            flex-direction: column;
            justify-content: space-between;
            background-color: #6a0dad; /* Custom Purple background */
            background-image: url('https://i.imgur.com/oV1V1mS.png'); /* I've created a sample duck pattern background for you */
            background-repeat: repeat;
            background-size: 50px; /* Adjust size of duck pattern */
            width: 100%;
            height: 100%;
        }

        /* -- Chat Header -- */
        #chat-header {
            background-color: rgba(255, 255, 255, 0.9); /* Translucent white header */
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ddd;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        #header-logo {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 10px;
        }

        #chat-header-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
            display: flex;
            align-items: center;
        }

        .header-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            color: #555;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 5px;
        }

        .header-btn:hover {
            background-color: #f0f0f0;
        }

        /* -- Chat Window -- */
        #chat-window {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto; /* Allow messages to scroll */
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* -- Example Messages (for visual structure) -- */
        .message {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 15px;
            font-size: 1rem;
            line-height: 1.4;
            position: relative;
        }

        .user-message {
            align-self: flex-end;
            background-color: #007bff; /* Blue bubble for user */
            color: white;
            border-bottom-right-radius: 2px;
        }

        .duckie-message {
            align-self: flex-start;
            background-color: #f1f0f0; /* Light grey bubble for Duckie */
            color: #333;
            border-bottom-left-radius: 2px;
        }

        /* -- Chat Input Area -- */
        #chat-input-area {
            background-color: rgba(255, 255, 255, 0.95); /* Translucent white input bar */
            padding: 10px;
            display: flex;
            align-items: center;
            border-top: 1px solid #ddd;
            gap: 10px;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
        }

        .icon-btn img {
            width: 24px;
            height: 24px;
            opacity: 0.7;
        }

        .icon-btn:hover img {
            opacity: 1;
        }

        #user-message-input {
            flex-grow: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 20px;
            font-size: 1rem;
            outline: none;
        }

        #send-message-btn {
            background-color: #28a745; /* Green Send button */
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
        }

        #send-message-btn:hover {
            background-color: #218838;
        }

    </style>
</head>
<body>

    <!-- The Main Application Container -->
    <div id="app-container">

        <!-- SCREEN 1: THE APP FACE -->
        <div id="app-face" onclick="showChat()">
            <!-- Your Circular Logo -->
            <img id="logo-image" src="https://i.imgur.com/oV1V1mS.png" alt="Duckie Talk ^+^_^/ Logo">

            <!-- Your App Title -->
            <h1 id="app-title">Duckie Talk</h1>

            <!-- Your App Sub-text -->
            <h2 id="app-subtitle">^ + ^ _ /</h2>
        </div>

        <!-- SCREEN 2: THE CHAT INTERFACE -->
        <div id="chat-interface">

            <!-- Chat Header -->
            <div id="chat-header">
                <div id="chat-header-title">
                    <img id="header-logo" src="https://i.imgur.com/oV1V1mS.png" alt="Duckie Talk ^+^_^/ Logo">
                    Duckie Talk ^+^_^/
                </div>
                <div>
                    <button class="header-btn" onclick="alert('Settings Coming Soon!')">⚙️ Settings</button>
                    <button class="header-btn" onclick="showAppFace()">✕ Close</button>
                </div>
            </div>

            <!-- Chat Window (Messages appear here) -->
            <div id="chat-window">
                <!-- Example Messages to show design -->
                <div class="message duckie-message">Quack! Hello there! How can I help you make some Heat Hop today?</div>
                <div class="message user-message">Hello Duckie! I want to build my own application.</div>
            </div>

            <!-- Chat Input Area -->
            <div id="chat-input-area">
                <button class="icon-btn" title="Emoji">😊</button>
                <button class="icon-btn" title="GIF">GIF</button>
                <button class="icon-btn" title="Stickers">🙂</button>

                <!-- The main input box -->
                <input type="text" id="user-message-input" placeholder="Ask Duckie anything..."></input>

                <button class="icon-btn" title="Send Question">❓</button>
                <button class="icon-btn" title="Gallery">🖼️</button>
                <button class="icon-btn" title="Microphone">🎤</button>

                <button id="send-message-btn">Send</button>
            </div>
        </div>

    </div>

    <!-- JAVASCRIPT (To control the screens) -->
    <script>
        // Get the screen elements
        const appFace = document.getElementById('app-face');
        const chatInterface = document.getElementById('chat-interface');

        // Function to show the Chat Interface
        function showChat() {
            appFace.style.display = 'none';
            chatInterface.style.display = 'flex';
        }

        // Function to show the App Face (Home Screen)
        function showAppFace() {
            chatInterface.style.display = 'none';
            appFace.style.display = 'flex';
        }

        // This makes sure the input box is ready when the chat opens
        document.getElementById('user-message-input').focus();
    </script>
</body>
</html>
