<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duckie Talk Pro - DuckieDuck AI</title>
    <style>
        :root {
            --bg-color: #f0f8ff;
            --chat-bubble-user: #e1ffc7;
            --chat-bubble-ai: #f0f0f0;
            --header-color: #333;
            --text-color: #000;
        }
        body {
            font-family: 'Courier New', Courier, monospace;
            color: var(--text-color);
            background-color: var(--bg-color);
            display: flex;
            height: 100vh;
            margin: 0;
        }
        #sidebar {
            width: 250px;
            background: #222;
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        #sidebar button {
            background: #444;
            color: white;
            border: none;
            padding: 10px;
            text-align: left;
            cursor: pointer;
            border-radius: 5px;
        }
        #sidebar button:hover {
            background: #555;
        }
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }
        header {
            background: var(--header-color);
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ddd;
            height: 60px;
        }
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: white;
            border-radius: 8px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .message {
            padding: 10px 15px;
            border-radius: 8px;
            max-width: 75%;
            word-wrap: break-word;
        }
        .user-message {
            background-color: var(--chat-bubble-user);
            align-self: flex-end;
        }
        .ai-message {
            background-color: var(--chat-bubble-ai);
            align-self: flex-start;
        }
        .input-area {
            display: flex;
            gap: 10px;
        }
        .input-area input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .input-area button {
            padding: 10px 20px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="sidebar">
        <h3>Duckie Talk Pro</h3>
        <button onclick="switchTab('chat')">Chat IA</button>
        <button onclick="switchTab('calls')">Llamadas</button>
        <button onclick="switchTab('plan')">Tu Plan Móvil</button>
        <button onclick="switchTab('settings')">Ajustes</button>
    </div>

    <div id="main">
        <header>
            <span id="header-title">Centro de Chat IA</span>
        </header>

        <div id="chat-view" class="view-section">
            <div id="chat-container">
                <div class="message ai-message">Hello! I am DuckieDuck, your personal AI assistant. How can I help you today?</div>
            </div>
            <div class="input-area">
                <input type="password" id="apiKeyInput" placeholder="Llave API (AIza...)" style="max-width: 200px;">
                <input type="text" id="userInput" placeholder="Escribe tu mensaje...">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>

        <div id="calls-view" class="view-section" style="display:none;">
            <h2>Sección de Llamadas</h2>
            <p>Próximamente disponible.</p>
        </div>

        <div id="plan-view" class="view-section" style="display:none;">
            <h2>Tu Plan Móvil</h2>
            <p>Información de tu línea y negocio.</p>
        </div>

        <div id="settings-view" class="view-section" style="display:none;">
            <h2>Ajustes</h2>
            <p>Configuración general.</p>
        </div>
    </div>

    <script>
        function switchTab(tabName) {
            document.getElementById('chat-view').style.display = 'none';
            document.getElementById('calls-view').style.display = 'none';
            document.getElementById('plan-view').style.display = 'none';
            document.getElementById('settings-view').style.display = 'none';

            document.getElementById(tabName + '-view').style.display = 'block';
            
            const titles = {
                'chat': 'Centro de Chat IA',
                'calls': 'Teclado de Llamadas',
                'plan': 'Tu Plan Móvil',
                'settings': 'Ajustes del Sistema'
            };
            document.getElementById('header-title').textContent = titles[tabName];
        }

        function sendMessage() {
            const inputField = document.getElementById('userInput');
            const chatContainer = document.getElementById('chat-container');
            const apiKeyInput = document.getElementById('apiKeyInput');
            
            const text = inputField.value.trim();
            if (!text) return;

            const userMsg = document.createElement('div');
            userMsg.className = 'message user-message';
            userMsg.textContent = text;
            chatContainer.appendChild(userMsg);
            
            inputField.value = '';
            chatContainer.scrollTop = chatContainer.scrollHeight;

            setTimeout(() => {
                const aiMsg = document.createElement('div');
                aiMsg.className = 'message ai-message';
                
                if(!apiKeyInput.value.trim()) {
                    aiMsg.textContent = "Por favor ingresa tu llave API (AIza...) en el campo correspondiente para conectar con los servidores de Duckie.";
                } else {
                    aiMsg.textContent = "Conectado correctamente. Recibido: " + text;
                }
                
                chatContainer.appendChild(aiMsg);
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }, 500);
        }
    </script>
</body>
</html>
